name: Build and Release Arch ISO

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (jq + pup)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          latest_pup="$(curl -s https://api.github.com/repos/ericchiang/pup/releases | jq '.[0].tag_name' -r)"
          curl -L -o pup.zip \
            "https://github.com/ericchiang/pup/releases/download/${latest_pup}/pup_${latest_pup}_linux_amd64.zip"
          unzip pup.zip
          mv pup /usr/local/bin
          rm pup.zip

      - name: Check if release should run
        id: should_release
        run: |
          if ./ops/github.sh should_release; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no release needed
        if: steps.should_release.outputs.release != 'true'
        run: |
          echo "No release needed today. Exiting."
          exit 0

      - name: Build docker builder image
        if: steps.should_release.outputs.release == 'true'
        run: ./docker/build-image.sh

      - name: Build ISO
        if: steps.should_release.outputs.release == 'true'
        run: ./docker/build-iso.sh

      - name: Locate ISO
        if: steps.should_release.outputs.release == 'true'
        id: iso
        run: |
          FILE=$(find target -type f -name "*.iso" | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          basename="${FILE##*/}"
          echo "release_name=${basename%%.iso}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.should_release.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.iso.outputs.release_name }}
          name: ${{ steps.iso.outputs.release_name }}
          files: ${{ steps.iso.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
